openapi: 3.1.0

info:
  title: document-pipeline
  version: 0.2.0
  description: |
    Ingests documents through a configurable OCR → clarify → classify → embed pipeline,
    and stores the results in a vector database for RAG queries.

    Documents move through pipeline stages asynchronously. The frontend polls
    for state changes and streams live LLM output via Server-Sent Events.

tags:
  - name: Pipelines
    description: Pipeline configuration — stage names, types, and models.
  - name: Documents
    description: Document data — title, context, artifacts, and image.
  - name: Jobs
    description: Pipeline execution state and state-transition events for a document.
  - name: Contexts
    description: Reusable named context snippets that can be attached to documents.
  - name: Chat
    description: RAG chat over the embedded knowledge base.

paths:

  # ── Pipelines ────────────────────────────────────────────────────────────────

  /api/v1/pipelines:
    get:
      tags: [Pipelines]
      summary: List pipelines
      description: Returns a paginated list of pipeline configurations loaded from `pipeline.yaml`.
      operationId: listPipelines
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Paginated list of pipeline summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPipelines'

  /api/v1/pipelines/{pipeline_id}:
    parameters:
      - $ref: '#/components/parameters/pipeline_id'
    get:
      tags: [Pipelines]
      summary: Get pipeline detail
      description: Returns the full configuration for a single pipeline including all stages.
      operationId: getPipeline
      responses:
        '200':
          description: Full pipeline configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Documents ────────────────────────────────────────────────────────────────

  /api/v1/documents:
    get:
      tags: [Documents]
      summary: List documents
      description: Returns a paginated list of documents with pure data fields (no job state).
      operationId: listDocuments
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/stagesFilter'
        - $ref: '#/components/parameters/statesFilter'
        - $ref: '#/components/parameters/sortOrder'
      responses:
        '200':
          description: Paginated list of document summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocuments'
    post:
      tags: [Documents]
      summary: Upload a document
      description: Upload a .txt, .md, or image file to create a new document. Text files skip the OCR stage.
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  nullable: true
                document_context:
                  type: string
                  nullable: true
                context_ref:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Document created. Returns initial job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '400':
          description: Unsupported file type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate file — document already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{doc_id}:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Documents]
      summary: Get document detail
      description: Returns pure document data — title, context, artifacts, and image availability. Does not include job/pipeline state.
      operationId: getDocument
      responses:
        '200':
          description: Document detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Documents]
      summary: Update document
      description: Updates one or more mutable document fields. Only fields present in the request body are changed.
      operationId: patchDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDocumentBody'
      responses:
        '200':
          description: Updated document detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Documents]
      summary: Delete document
      description: Permanently deletes the document, all stage data, and all events.
      operationId: deleteDocument
      responses:
        '200':
          description: Document deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/documents/{doc_id}/image:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Documents]
      summary: Get document image
      description: Returns the original PNG image captured from the reMarkable tablet.
      operationId: getDocumentImage
      responses:
        '200':
          description: PNG image bytes.
          content:
            image/png:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Jobs ─────────────────────────────────────────────────────────────────────

  /api/v1/jobs:
    get:
      tags: [Jobs]
      summary: List all jobs
      description: |
        Returns a paginated list of all jobs with denormalized document title.
        Useful for dashboard views; filters and sort are independent of pagination.
        When `documentId` is provided, returns only the job(s) for that document.
      operationId: listJobs
      parameters:
        - name: documentId
          in: query
          required: false
          description: Filter to jobs for a specific document UUID.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/stagesFilter'
        - $ref: '#/components/parameters/statesFilter'
        - $ref: '#/components/parameters/sortOrder'
      responses:
        '200':
          description: Paginated list of job summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobs'

  /api/v1/jobs/{job_id}:
    parameters:
      - $ref: '#/components/parameters/job_id'
    get:
      tags: [Jobs]
      summary: Get job detail
      description: Returns the current pipeline execution state — stage, state, review data, and available replay stages.
      operationId: getJob
      responses:
        '200':
          description: Job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Jobs]
      summary: Update job config
      description: Updates mutable job configuration fields (e.g. `embed_image`). Returns the updated job detail.
      operationId: patchJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchJobBody'
      responses:
        '200':
          description: Updated job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/jobs/{job_id}/stream:
    parameters:
      - $ref: '#/components/parameters/job_id'
    get:
      tags: [Jobs]
      summary: Stream LLM tokens (SSE)
      description: |
        Server-Sent Events stream of LLM output tokens while the job is
        in the `running` state. Emits `token` events with `{"text": "..."}` payloads
        and a final `done` event when generation completes or state changes.
      operationId: streamJobTokens
      responses:
        '200':
          description: SSE stream of token events.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/jobs/{job_id}/events:
    parameters:
      - $ref: '#/components/parameters/job_id'
    get:
      tags: [Jobs]
      summary: List job events
      description: Returns the paginated event history for a job.
      operationId: listJobEvents
      parameters:
        - name: afterId
          in: query
          required: false
          description: Return only events with an internal ID greater than this value (cursor).
          schema:
            type: integer
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Paginated list of job events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobEvents'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Jobs]
      summary: Post a job event
      description: |
        Triggers a state transition on the job. The `type` field discriminates the
        event body. Returns the updated job detail.

        | type | Effect |
        |------|--------|
        | `approve` | Advance to next stage, optionally with edited text |
        | `reject` | Discard output and reset stage to pending |
        | `clarify` | Provide answers/prompt and retry the stage |
        | `retry` | Reset stage from error/waiting back to pending |
        | `stop` | Force-set stage state to error |
        | `replay` | Rewind to a previous stage |
        | `provide_context` | Save context and advance if stage was waiting |
        | `clear_errors` | Remove all failed events from history |
      operationId: postJobEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobEventBody'
      responses:
        '200':
          description: Updated job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Contexts ─────────────────────────────────────────────────────────────────

  /api/v1/contexts:
    get:
      tags: [Contexts]
      summary: List contexts
      description: Returns a paginated list of saved context entries.
      operationId: listContexts
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Paginated list of context entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContexts'
    post:
      tags: [Contexts]
      summary: Create context
      description: Creates a new context entry with an immutable UUID.
      operationId: createContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContextBody'
      responses:
        '201':
          description: Created context entry with assigned ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextEntry'

  /api/v1/contexts/{context_id}:
    parameters:
      - $ref: '#/components/parameters/context_id'
    patch:
      tags: [Contexts]
      summary: Update context
      description: Updates the name and/or text of a context entry. Only present fields are changed.
      operationId: updateContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContextBody'
      responses:
        '200':
          description: Updated context entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextEntry'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Contexts]
      summary: Delete context
      description: Permanently deletes a context entry by its immutable ID.
      operationId: deleteContext
      responses:
        '200':
          description: Context deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Chat ─────────────────────────────────────────────────────────────────────

  /api/v1/chats:
    get:
      tags: [Chat]
      summary: List chat sessions
      operationId: listChatSessions
      parameters:
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: before_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of chat sessions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatSessions'
    post:
      tags: [Chat]
      summary: Create a new chat session
      operationId: createChatSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatSessionBody'
      responses:
        '200':
          description: Newly created chat session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionSummary'

  /api/v1/chats/{session_id}:
    get:
      tags: [Chat]
      summary: Get chat session with messages
      operationId: getChatSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chat session detail including full message history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Chat]
      summary: Update chat session title, context, or top_k
      operationId: patchChatSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchChatSessionBody'
      responses:
        '200':
          description: Updated chat session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionSummary'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Chat]
      summary: Delete a chat session and all its messages
      operationId: deleteChatSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session deleted.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/chats/{session_id}/messages:
    post:
      tags: [Chat]
      summary: Send a message and stream the RAG-augmented reply
      operationId: sendChatMessage
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageBody'
      responses:
        '200':
          description: SSE stream of token events followed by a done event.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

components:

  # ── Reusable parameters ───────────────────────────────────────────────────────

  parameters:
    doc_id:
      name: doc_id
      in: path
      required: true
      description: UUID of the document.
      schema:
        type: string
        format: uuid

    job_id:
      name: job_id
      in: path
      required: true
      description: UUID of the job row.
      schema:
        type: string
        format: uuid

    context_id:
      name: context_id
      in: path
      required: true
      description: Immutable UUID of the context entry.
      schema:
        type: string
        format: uuid

    pipeline_id:
      name: pipeline_id
      in: path
      required: true
      description: Pipeline identifier (filename stem, e.g. `pipeline`).
      schema:
        type: string

    pageToken:
      name: pageToken
      in: query
      required: false
      description: Opaque cursor token returned by the previous page response. Omit for the first page.
      schema:
        type: string

    pageSize:
      name: pageSize
      in: query
      required: false
      description: Maximum number of results to return (default 50, max 1000).
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000

    stagesFilter:
      name: stages
      in: query
      required: false
      description: Comma-separated list of pipeline stage names to filter by.
      schema:
        type: string
        example: ocr,clarify

    statesFilter:
      name: states
      in: query
      required: false
      description: Comma-separated list of stage states to filter by.
      schema:
        type: string
        example: pending,waiting

    sortOrder:
      name: sort
      in: query
      required: false
      description: Sort order.
      schema:
        type: string
        default: pipeline
        enum: [pipeline, title_asc, title_desc, created_asc, created_desc]

  # ── Reusable responses ────────────────────────────────────────────────────────

  responses:
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ── Schemas ───────────────────────────────────────────────────────────────────

  schemas:

    # — Shared primitives ——————————————————————————————————————————————————————

    StageState:
      type: string
      description: Current execution state of a document within its active pipeline stage.
      enum: [pending, running, waiting, error, done]

    ErrorResponse:
      type: object
      description: Generic error body.
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    OkResponse:
      type: object
      description: Simple success acknowledgement.
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Always true on success.

    # — Pipelines ——————————————————————————————————————————————————————————————

    PipelineStageConfig:
      type: object
      description: Configuration for a single pipeline stage.
      required: [name, type]
      properties:
        name:
          type: string
          description: Stage identifier (e.g. `ocr`, `clarify`).
        type:
          type: string
          description: Stage handler type (e.g. `llm_text`, `embed`).
        model:
          type: string
          nullable: true
          description: Model override for LLM stages.

    PipelineSummary:
      type: object
      description: Lightweight pipeline representation used in list views.
      required: [id, name, stage_count]
      properties:
        id:
          type: string
          description: Pipeline identifier (filename stem).
        name:
          type: string
          description: Human-readable pipeline name.
        stage_count:
          type: integer
          description: Number of stages in the pipeline.

    PipelineDetail:
      type: object
      description: Full pipeline configuration including all stages.
      required: [id, name, stages]
      properties:
        id:
          type: string
          description: Pipeline identifier (filename stem).
        name:
          type: string
          description: Human-readable pipeline name.
        stages:
          type: array
          description: Ordered list of stage configurations.
          items:
            $ref: '#/components/schemas/PipelineStageConfig'

    PaginatedPipelines:
      type: object
      description: Paginated list of pipeline summaries.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PipelineSummary'
        nextPageToken:
          type: string
          nullable: true
          description: Opaque cursor; pass as `pageToken` on next request. Null when no more pages.

    # — Documents ——————————————————————————————————————————————————————————————

    DocumentSummary:
      type: object
      description: Lightweight document representation used in list views. Does not include job/pipeline state.
      required: [id, needs_context, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique document identifier.
        title:
          type: string
          nullable: true
          description: Human-readable title.
        needs_context:
          type: boolean
          description: True if the document's current stage is blocked waiting for context.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp.

    DocumentDetail:
      type: object
      description: Full document data — title, context, artifacts, and image availability. Does not include job/pipeline state.
      required: [id, document_context, has_image, stage_displays, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique document identifier.
        title:
          type: string
          nullable: true
          description: Human-readable document title.
        document_context:
          type: string
          description: Free-text context attached by the user to guide LLM stages.
        context_ref:
          type: string
          nullable: true
          description: UUID of a saved context entry linked to this document.
        current_job_id:
          type: string
          nullable: true
          description: UUID of the active job row for the current pipeline stage.
        has_image:
          type: boolean
          description: True if a source PNG image is available.
        stage_displays:
          type: array
          items:
            $ref: '#/components/schemas/StageDisplay'
          description: Completed stage outputs available for display.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp.

    PaginatedDocuments:
      type: object
      description: Paginated list of document summaries.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        nextPageToken:
          type: string
          nullable: true
          description: Opaque cursor; pass as `pageToken` on next request. Null when no more pages.

    StageDisplay:
      type: object
      description: Named output fields produced by a completed pipeline stage.
      required: [name, fields]
      properties:
        name:
          type: string
          description: Pipeline stage name (e.g. `ocr`, `clarify`).
        fields:
          type: object
          description: Map of field name to text value for each output produced by the stage.
          additionalProperties:
            type: string

    # — Jobs ———————————————————————————————————————————————————————————————————

    JobSummary:
      type: object
      description: Lightweight job representation with denormalized document title, used in dashboard list views.
      required: [doc_id, current_stage, stage_state, needs_context, created_at, updated_at]
      properties:
        doc_id:
          type: string
          format: uuid
          description: UUID of the document this job belongs to.
        title:
          type: string
          nullable: true
          description: Denormalized document title.
        current_stage:
          type: string
          description: Name of the stage the document is currently in.
        stage_state:
          $ref: '#/components/schemas/StageState'
        needs_context:
          type: boolean
          description: True if the current stage is blocked waiting for context input.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp.

    JobDetail:
      type: object
      description: Full pipeline execution state for a document.
      required: [id, doc_id, current_stage, stage_state, needs_context, context_required, embed_image, replay_stages]
      properties:
        id:
          type: string
          description: UUID of the active job row for the current stage.
        doc_id:
          type: string
          format: uuid
          description: UUID of the document this job belongs to.
        current_stage:
          type: string
          description: Name of the stage the document is currently in.
        stage_state:
          $ref: '#/components/schemas/StageState'
        needs_context:
          type: boolean
          description: True if the current stage is blocked waiting for context input.
        context_required:
          type: boolean
          description: True when the current stage requires context before it can run at all.
        embed_image:
          type: boolean
          default: false
          description: Whether the embed stage should include a visual image vector.
        review:
          $ref: '#/components/schemas/ReviewDetail'
          nullable: true
          description: Present when the document is waiting for human review.
        replay_stages:
          type: array
          items:
            $ref: '#/components/schemas/ReplayStage'
          description: Completed stages the job can be rewound to.

    PaginatedJobs:
      type: object
      description: Paginated list of job summaries.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobSummary'
        nextPageToken:
          type: string
          nullable: true
          description: Opaque cursor; pass as `pageToken` on next request. Null when no more pages.

    JobEventRecord:
      type: object
      description: A single recorded event in a job's history.
      required: [id, timestamp, stage, event_type]
      properties:
        id:
          type: integer
          description: Monotonically increasing internal event ID (used as cursor).
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the event was recorded.
        stage:
          type: string
          description: Pipeline stage name at time of event.
        event_type:
          type: string
          description: Type of event (e.g. `approved`, `completed`, `error`).
        data:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional event payload.

    PaginatedJobEvents:
      type: object
      description: Paginated list of job events in chronological order.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobEventRecord'
        nextPageToken:
          type: string
          nullable: true
          description: Opaque cursor; pass as `pageToken` on next request. Null when no more pages.

    PatchJobBody:
      type: object
      description: Mutable per-job configuration fields.
      properties:
        embed_image:
          type: boolean
          nullable: true
          description: Set to true/false to control image embedding for the embed stage.

    ReplayStage:
      type: object
      description: A completed stage that the job can be rewound to.
      required: [name]
      properties:
        name:
          type: string
          description: Pipeline stage name.

    ReviewDetail:
      type: object
      description: |
        LLM review data present when a job is in `waiting` state at an
        `llm_text` stage. Contains the input, output, and any clarification
        questions the LLM raised.
      required:
        - stage_name
        - input_text
        - output_text
        - is_single_output
        - confidence
        - qa_rounds
        - clarification_requests
        - document_context_update
        - linked_context_update
      properties:
        stage_name:
          type: string
          description: Name of the stage awaiting review.
        input_field:
          type: string
          nullable: true
          description: Source field name fed into the LLM prompt.
        output_field:
          type: string
          nullable: true
          description: Field name where the LLM output is stored.
        input_text:
          type: string
          description: The text sent to the LLM.
        output_text:
          type: string
          description: The LLM's output awaiting approval.
        is_single_output:
          type: boolean
          description: True when the stage writes a single output field.
        confidence:
          type: string
          description: LLM-reported confidence in the output.
        qa_rounds:
          type: integer
          description: Number of clarification rounds completed so far.
        clarification_requests:
          type: array
          description: Questions the LLM raised that need answers before it can proceed.
          items:
            $ref: '#/components/schemas/ClarificationRequest'
        document_context_update:
          type: string
          description: Suggested update to the document's context field, proposed by the LLM.
        linked_context_update:
          type: string
          description: Suggested update to the linked context entry, proposed by the LLM.
        context_ref:
          type: string
          nullable: true
          description: UUID of the linked context entry, if any.

    ClarificationRequest:
      type: object
      description: A question the LLM raised about a specific text segment.
      required: [segment, question]
      properties:
        segment:
          type: string
          description: The text segment that prompted the question.
        question:
          type: string
          description: The clarification question to present to the user.

    # — Job event bodies (discriminated union) ——————————————————————————————————

    ApproveEvent:
      type: object
      description: Advance the stage to the next, optionally replacing the LLM output with edited text.
      required: [type]
      properties:
        type:
          type: string
          enum: [approve]
          description: Event discriminator.
        edited_text:
          type: string
          default: ''
          description: Replacement text for the LLM output. Empty string keeps the original.

    RejectEvent:
      type: object
      description: Discard the LLM output and reset the stage to pending.
      required: [type]
      properties:
        type:
          type: string
          enum: [reject]
          description: Event discriminator.

    ClarifyEvent:
      type: object
      description: Provide clarification answers or a free prompt and retry the stage.
      required: [type]
      properties:
        type:
          type: string
          enum: [clarify]
          description: Event discriminator.
        answers:
          type: object
          additionalProperties:
            type: string
          default: {}
          description: Map of question text to answer text for each clarification request.
        free_prompt:
          type: string
          default: ''
          description: Additional instruction appended to the retry prompt.
        edited_text:
          type: string
          default: ''
          description: Optionally replace the existing output before retrying.

    RetryEvent:
      type: object
      description: Reset the stage from error or waiting back to pending.
      required: [type]
      properties:
        type:
          type: string
          enum: [retry]
          description: Event discriminator.

    StopEvent:
      type: object
      description: Force the stage into the error state.
      required: [type]
      properties:
        type:
          type: string
          enum: [stop]
          description: Event discriminator.

    ReplayEvent:
      type: object
      description: Rewind the document to a previously completed stage.
      required: [type, stage]
      properties:
        type:
          type: string
          enum: [replay]
          description: Event discriminator.
        stage:
          type: string
          description: Name of the pipeline stage to rewind to.

    ProvideContextEvent:
      type: object
      description: Supply context to unblock a stage that is waiting for it.
      required: [type]
      properties:
        type:
          type: string
          enum: [provide_context]
          description: Event discriminator.
        document_context:
          type: string
          default: ''
          description: Free-text context to attach to the document.
        context_ref:
          type: string
          nullable: true
          description: UUID of a saved context entry to link.

    ClearErrorsEvent:
      type: object
      description: Remove all failed events from the job's event history.
      required: [type]
      properties:
        type:
          type: string
          enum: [clear_errors]
          description: Event discriminator.

    JobEventBody:
      description: Discriminated union of all job state-transition event types.
      oneOf:
        - $ref: '#/components/schemas/ApproveEvent'
        - $ref: '#/components/schemas/RejectEvent'
        - $ref: '#/components/schemas/ClarifyEvent'
        - $ref: '#/components/schemas/RetryEvent'
        - $ref: '#/components/schemas/StopEvent'
        - $ref: '#/components/schemas/ReplayEvent'
        - $ref: '#/components/schemas/ProvideContextEvent'
        - $ref: '#/components/schemas/ClearErrorsEvent'
      discriminator:
        propertyName: type
        mapping:
          approve: '#/components/schemas/ApproveEvent'
          reject: '#/components/schemas/RejectEvent'
          clarify: '#/components/schemas/ClarifyEvent'
          retry: '#/components/schemas/RetryEvent'
          stop: '#/components/schemas/StopEvent'
          replay: '#/components/schemas/ReplayEvent'
          provide_context: '#/components/schemas/ProvideContextEvent'
          clear_errors: '#/components/schemas/ClearErrorsEvent'

    # — Contexts ———————————————————————————————————————————————————————————————

    ContextEntry:
      type: object
      description: A named reusable context snippet with an immutable UUID.
      required: [id, name, text]
      properties:
        id:
          type: string
          format: uuid
          description: Immutable identifier assigned at creation.
        name:
          type: string
          description: Human-readable name for this context entry.
        text:
          type: string
          description: The context text injected into LLM prompts.

    PaginatedContexts:
      type: object
      description: Paginated list of context entries.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContextEntry'
        nextPageToken:
          type: string
          nullable: true
          description: Opaque cursor; pass as `pageToken` on next request. Null when no more pages.

    CreateContextBody:
      type: object
      description: Payload for creating a new context entry.
      required: [name, text]
      properties:
        name:
          type: string
          description: Human-readable name for this context entry.
        text:
          type: string
          description: The context text injected into LLM prompts.

    UpdateContextBody:
      type: object
      description: Fields to update on a context entry. Omitted fields are unchanged.
      properties:
        name:
          type: string
          nullable: true
          description: Updated name. Null leaves unchanged.
        text:
          type: string
          nullable: true
          description: Updated context text. Null leaves unchanged.

    # — Documents request bodies ————————————————————————————————————————————————

    PatchDocumentBody:
      type: object
      description: Fields to update on a document. Only present fields are applied.
      properties:
        title:
          type: string
          nullable: true
          description: Updated document title. Null clears the title.
        document_context:
          type: string
          nullable: true
          description: Free-text context to attach to the document. Null clears it.
        context_ref:
          type: string
          nullable: true
          description: UUID of a context entry to link, or null to unlink.

    # — Chat ———————————————————————————————————————————————————————————————————

    SourceDoc:
      type: object
      description: A document retrieved from the vector store as a RAG source.
      required: [doc_id, title, score]
      properties:
        doc_id:
          type: string
          format: uuid
          description: UUID of the source document.
        title:
          type: string
          description: Document title.
        summary:
          type: string
          default: ''
          description: Brief summary of the document's content.
        date_month:
          type: string
          default: ''
          description: YYYY-MM month label for the document.
        score:
          type: number
          format: float
          description: Vector similarity score.

    ChatSessionSummary:
      type: object
      description: Lightweight chat session representation used in list views.
      required: [id, title, context, top_k, created_at, updated_at, message_count]
      properties:
        id:
          type: string
          description: Session UUID.
        title:
          type: string
          description: Auto-derived from the first user message (first 60 chars).
        context:
          type: string
          description: Optional freeform context injected into every system prompt.
        top_k:
          type: integer
          description: Number of Qdrant results to retrieve per query.
        created_at:
          type: string
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          description: ISO 8601 last-updated timestamp.
        message_count:
          type: integer
          description: Total number of messages in the session.

    ChatSessionDetail:
      type: object
      description: Full chat session including all message history.
      required: [id, title, context, top_k, created_at, updated_at, messages]
      properties:
        id:
          type: string
          description: Session UUID.
        title:
          type: string
          description: Auto-derived from the first user message (first 60 chars).
        context:
          type: string
          description: Optional freeform context injected into every system prompt.
        top_k:
          type: integer
          description: Number of Qdrant results to retrieve per query.
        created_at:
          type: string
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          description: ISO 8601 last-updated timestamp.
        messages:
          type: array
          description: All messages in the session in chronological order.
          items:
            $ref: '#/components/schemas/ChatMessageRecord'

    ChatMessageRecord:
      type: object
      description: A single message turn in a chat session.
      required: [id, role, content, created_at]
      properties:
        id:
          type: integer
          description: Auto-increment row ID; defines message ordering.
        role:
          type: string
          description: Message author.
          enum: [user, assistant]
        content:
          type: string
          description: Message text.
        sources:
          type: array
          nullable: true
          description: Retrieved source documents (only set on assistant messages).
          items:
            $ref: '#/components/schemas/SourceDoc'
        created_at:
          type: string
          description: ISO 8601 creation timestamp.

    CreateChatSessionBody:
      type: object
      description: Options for creating a new chat session.
      properties:
        context:
          type: string
          default: ''
          description: Optional freeform context injected into every system prompt.
        top_k:
          type: integer
          default: 5
          minimum: 1
          maximum: 20
          description: Number of Qdrant results to retrieve per query.

    PatchChatSessionBody:
      type: object
      description: Fields to update on an existing chat session. Omitted fields are unchanged.
      properties:
        title:
          type: string
          nullable: true
          description: Override the auto-derived title.
        context:
          type: string
          nullable: true
          description: Optional freeform context injected into every system prompt.
        top_k:
          type: integer
          nullable: true
          minimum: 1
          maximum: 20
          description: Number of Qdrant results to retrieve per query.

    SendMessageBody:
      type: object
      description: A new user message to send to the chat session.
      required: [content]
      properties:
        content:
          type: string
          description: The user's message text.

    PaginatedChatSessions:
      type: object
      description: Paginated list of chat sessions ordered by most recently updated.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChatSessionSummary'
        next_before_id:
          type: string
          nullable: true
          description: Pass as `before_id` to fetch the next page. Null when no more pages.
