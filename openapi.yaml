openapi: 3.1.0

info:
  title: document-pipeline
  version: 0.1.0
  description: |
    Ingests handwritten notes from a reMarkable tablet, runs them through a
    configurable OCR → clarify → classify → embed pipeline, and stores the
    results in a vector database for RAG queries.

    Documents move through pipeline stages asynchronously. The frontend polls
    for state changes and streams live LLM output via Server-Sent Events.

tags:
  - name: Ingest
    description: Webhook endpoint for reMarkable tablet push notifications.
  - name: Pipelines
    description: Pipeline configuration — stage names, types, and models.
  - name: Documents
    description: Document data — title, context, artifacts, and image.
  - name: Jobs
    description: Pipeline execution state and state-transition events for a document.
  - name: Contexts
    description: Reusable named context snippets that can be attached to documents.
  - name: Chat
    description: RAG chat over the embedded knowledge base.

paths:

  # ── Ingest ──────────────────────────────────────────────────────────────────

  /webhook:
    post:
      tags: [Ingest]
      summary: Receive document from reMarkable (deprecated)
      description: |
        **Deprecated** — use `/api/v1/remarkable/webhook` instead.

        Receives a document pushed by rmfakecloud from the reMarkable tablet.
        Kept for backwards compatibility.
      operationId: receiveWebhookLegacy
      deprecated: true
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: JSON-encoded document metadata from rmfakecloud.
                attachment:
                  type: string
                  format: binary
                  description: PNG image of the reMarkable sheet.
      responses:
        '200':
          description: Document accepted (or silently skipped as a duplicate).

  /api/v1/remarkable/webhook:
    post:
      tags: [Ingest]
      summary: Receive document from reMarkable
      description: |
        Receives a document pushed by rmfakecloud from the reMarkable tablet.
        Expects `multipart/form-data` with two fields:
        - `data`: JSON string containing document metadata and destination names.
        - `attachment`: rendered PNG of the current sheet.

        The document is persisted immediately and OCR runs asynchronously.
        Returns 200 as soon as the file is saved (or if it is a duplicate).
      operationId: receiveWebhook
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: JSON-encoded document metadata from rmfakecloud.
                attachment:
                  type: string
                  format: binary
                  description: PNG image of the reMarkable sheet.
      responses:
        '200':
          description: Document accepted (or silently skipped as a duplicate).

  # ── Pipelines ────────────────────────────────────────────────────────────────

  /api/v1/pipelines:
    get:
      tags: [Pipelines]
      summary: List pipelines
      description: Returns a paginated list of pipeline configurations loaded from `pipeline.yaml`.
      operationId: listPipelines
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Paginated list of pipeline summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPipelines'

  /api/v1/pipelines/{pipeline_id}:
    parameters:
      - $ref: '#/components/parameters/pipeline_id'
    get:
      tags: [Pipelines]
      summary: Get pipeline detail
      description: Returns the full configuration for a single pipeline including all stages.
      operationId: getPipeline
      responses:
        '200':
          description: Full pipeline configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Documents ────────────────────────────────────────────────────────────────

  /api/v1/documents:
    get:
      tags: [Documents]
      summary: List documents
      description: Returns a paginated list of documents with pure data fields (no job state).
      operationId: listDocuments
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/stagesFilter'
        - $ref: '#/components/parameters/statesFilter'
        - $ref: '#/components/parameters/sortOrder'
      responses:
        '200':
          description: Paginated list of document summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocuments'
    post:
      tags: [Documents]
      summary: Upload a document
      description: Upload a .txt, .md, or image file to create a new document. Text files skip the OCR stage.
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  nullable: true
                document_context:
                  type: string
                  nullable: true
                context_ref:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Document created. Returns initial job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '400':
          description: Unsupported file type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate file — document already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{doc_id}:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Documents]
      summary: Get document detail
      description: Returns pure document data — title, context, artifacts, and image availability. Does not include job/pipeline state.
      operationId: getDocument
      responses:
        '200':
          description: Document detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Documents]
      summary: Update document
      description: Updates one or more mutable document fields. Only fields present in the request body are changed.
      operationId: patchDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDocumentBody'
      responses:
        '200':
          description: Updated document detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Documents]
      summary: Delete document
      description: Permanently deletes the document, all stage data, and all events.
      operationId: deleteDocument
      responses:
        '200':
          description: Document deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/documents/{doc_id}/image:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Documents]
      summary: Get document image
      description: Returns the original PNG image captured from the reMarkable tablet.
      operationId: getDocumentImage
      responses:
        '200':
          description: PNG image bytes.
          content:
            image/png:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Jobs ─────────────────────────────────────────────────────────────────────

  /api/v1/jobs:
    get:
      tags: [Jobs]
      summary: List all jobs
      description: |
        Returns a paginated list of all jobs with denormalized document title.
        Useful for dashboard views; filters and sort are independent of pagination.
      operationId: listJobs
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/stagesFilter'
        - $ref: '#/components/parameters/statesFilter'
        - $ref: '#/components/parameters/sortOrder'
      responses:
        '200':
          description: Paginated list of job summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobs'

  /api/v1/documents/{doc_id}/jobs:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Jobs]
      summary: Get job detail
      description: Returns the current pipeline execution state for a document — stage, state, review data, and available replay stages.
      operationId: getJob
      responses:
        '200':
          description: Job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/documents/{doc_id}/jobs/stream:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Jobs]
      summary: Stream LLM tokens (SSE)
      description: |
        Server-Sent Events stream of LLM output tokens while the document is
        in the `running` state. Emits `token` events with `{"text": "..."}` payloads
        and a final `done` event when generation completes or state changes.
      operationId: streamJobTokens
      responses:
        '200':
          description: SSE stream of token events.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/documents/{doc_id}/jobs/events:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Jobs]
      summary: List job events
      description: Returns the paginated event history for a document's job.
      operationId: listJobEvents
      parameters:
        - name: afterId
          in: query
          required: false
          description: Return only events with an internal ID greater than this value (cursor).
          schema:
            type: integer
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Paginated list of job events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobEvents'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Jobs]
      summary: Post a job event
      description: |
        Triggers a state transition on the job. The `type` field discriminates the
        event body. Returns the updated job detail.

        | type | Effect |
        |------|--------|
        | `approve` | Advance to next stage, optionally with edited text |
        | `reject` | Discard output and reset stage to pending |
        | `clarify` | Provide answers/prompt and retry the stage |
        | `retry` | Reset stage from error/waiting back to pending |
        | `stop` | Force-set stage state to error |
        | `replay` | Rewind to a previous stage |
        | `provide_context` | Save context and advance if stage was waiting |
        | `clear_errors` | Remove all failed events from history |
      operationId: postJobEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobEventBody'
      responses:
        '200':
          description: Updated job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Contexts ─────────────────────────────────────────────────────────────────

  /api/v1/contexts:
    get:
      tags: [Contexts]
      summary: List contexts
      description: Returns a paginated list of saved context entries.
      operationId: listContexts
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Paginated list of context entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContexts'
    post:
      tags: [Contexts]
      summary: Create context
      description: Creates a new context entry with an immutable UUID.
      operationId: createContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContextBody'
      responses:
        '201':
          description: Created context entry with assigned ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextEntry'

  /api/v1/contexts/{context_id}:
    parameters:
      - $ref: '#/components/parameters/context_id'
    patch:
      tags: [Contexts]
      summary: Update context
      description: Updates the name and/or text of a context entry. Only present fields are changed.
      operationId: updateContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContextBody'
      responses:
        '200':
          description: Updated context entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextEntry'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Contexts]
      summary: Delete context
      description: Permanently deletes a context entry by its immutable ID.
      operationId: deleteContext
      responses:
        '200':
          description: Context deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Chat ─────────────────────────────────────────────────────────────────────

  /api/v1/chats:
    post:
      tags: [Chat]
      summary: Start a RAG chat
      description: |
        Embeds the latest user message, searches the Qdrant vector store for
        relevant notes, builds a system prompt from the retrieved context, and
        streams the LLM response back as Server-Sent Events.

        SSE event types:
        - `sources`: JSON array of `SourceDoc` objects retrieved from the vector store.
        - `token`: `{"text": "..."}` — one LLM output token.
        - `done`: `{}` — generation complete.
        - `error`: `{"error": "..."}` — something went wrong.
      operationId: startChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE stream of sources, tokens, and completion events.
          content:
            text/event-stream:
              schema:
                type: string

components:

  # ── Reusable parameters ───────────────────────────────────────────────────────

  parameters:
    doc_id:
      name: doc_id
      in: path
      required: true
      description: UUID of the document.
      schema:
        type: string
        format: uuid

    context_id:
      name: context_id
      in: path
      required: true
      description: Immutable UUID of the context entry.
      schema:
        type: string
        format: uuid

    pipeline_id:
      name: pipeline_id
      in: path
      required: true
      description: Pipeline identifier (filename stem, e.g. `pipeline`).
      schema:
        type: string

    pageToken:
      name: pageToken
      in: query
      required: false
      description: Opaque cursor token returned by the previous page response. Omit for the first page.
      schema:
        type: string

    pageSize:
      name: pageSize
      in: query
      required: false
      description: Maximum number of results to return (default 50, max 1000).
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000

    stagesFilter:
      name: stages
      in: query
      required: false
      description: Comma-separated list of pipeline stage names to filter by.
      schema:
        type: string
        example: ocr,clarify

    statesFilter:
      name: states
      in: query
      required: false
      description: Comma-separated list of stage states to filter by.
      schema:
        type: string
        example: pending,waiting

    sortOrder:
      name: sort
      in: query
      required: false
      description: Sort order.
      schema:
        type: string
        default: pipeline
        enum: [pipeline, title_asc, title_desc, created_asc, created_desc]

  # ── Reusable responses ────────────────────────────────────────────────────────

  responses:
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ── Schemas ───────────────────────────────────────────────────────────────────

  schemas:

    # — Shared primitives ——————————————————————————————————————————————————————

    StageState:
      type: string
      description: Current execution state of a document within its active pipeline stage.
      enum: [pending, running, waiting, error, done]

    ErrorResponse:
      type: object
      description: Generic error body.
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    OkResponse:
      type: object
      description: Simple success acknowledgement.
      required: [ok]
      properties:
        ok:
          type: boolean

    # — Pipelines ——————————————————————————————————————————————————————————————

    PipelineStageConfig:
      type: object
      description: Configuration for a single pipeline stage.
      required: [name, type]
      properties:
        name:
          type: string
          description: Stage identifier (e.g. `ocr`, `clarify`).
        type:
          type: string
          description: Stage handler type (e.g. `llm_text`, `embed`).
        model:
          type: string
          nullable: true
          description: Model override for LLM stages.

    PipelineSummary:
      type: object
      description: Lightweight pipeline representation used in list views.
      required: [id, name, stage_count]
      properties:
        id:
          type: string
          description: Pipeline identifier (filename stem).
        name:
          type: string
          description: Human-readable pipeline name.
        stage_count:
          type: integer
          description: Number of stages in the pipeline.

    PipelineDetail:
      type: object
      description: Full pipeline configuration including all stages.
      required: [id, name, stages]
      properties:
        id:
          type: string
        name:
          type: string
        stages:
          type: array
          items:
            $ref: '#/components/schemas/PipelineStageConfig'

    PaginatedPipelines:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PipelineSummary'
        nextPageToken:
          type: string
          nullable: true

    # — Documents ——————————————————————————————————————————————————————————————

    DocumentSummary:
      type: object
      description: Lightweight document representation used in list views. Does not include job/pipeline state.
      required: [id, needs_context, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique document identifier.
        title:
          type: string
          nullable: true
          description: Human-readable title.
        needs_context:
          type: boolean
          description: True if the document's current stage is blocked waiting for context.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DocumentDetail:
      type: object
      description: Full document data — title, context, artifacts, and image availability. Does not include job/pipeline state.
      required: [id, document_context, has_image, stage_displays, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        document_context:
          type: string
          description: Free-text context attached by the user to guide LLM stages.
        context_ref:
          type: string
          nullable: true
          description: UUID of a saved context entry linked to this document.
        has_image:
          type: boolean
          description: True if a source PNG image is available.
        stage_displays:
          type: array
          items:
            $ref: '#/components/schemas/StageDisplay'
          description: Completed stage outputs available for display.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedDocuments:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        nextPageToken:
          type: string
          nullable: true

    StageDisplay:
      type: object
      description: Named output fields produced by a completed pipeline stage.
      required: [name, fields]
      properties:
        name:
          type: string
          description: Pipeline stage name (e.g. `ocr`, `clarify`).
        fields:
          type: object
          description: Map of field name to text value for each output produced by the stage.
          additionalProperties:
            type: string

    # — Jobs ———————————————————————————————————————————————————————————————————

    JobSummary:
      type: object
      description: Lightweight job representation with denormalized document title, used in dashboard list views.
      required: [doc_id, current_stage, stage_state, needs_context, created_at, updated_at]
      properties:
        doc_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
          description: Denormalized document title.
        current_stage:
          type: string
        stage_state:
          $ref: '#/components/schemas/StageState'
        needs_context:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JobDetail:
      type: object
      description: Full pipeline execution state for a document.
      required: [doc_id, current_stage, stage_state, needs_context, context_required, replay_stages]
      properties:
        doc_id:
          type: string
          format: uuid
        current_stage:
          type: string
        stage_state:
          $ref: '#/components/schemas/StageState'
        needs_context:
          type: boolean
          description: True if the current stage is blocked waiting for context input.
        context_required:
          type: boolean
          description: True when the current stage requires context before it can run at all.
        review:
          $ref: '#/components/schemas/ReviewDetail'
          nullable: true
          description: Present when the document is waiting for human review.
        replay_stages:
          type: array
          items:
            $ref: '#/components/schemas/ReplayStage'
          description: Completed stages the job can be rewound to.

    PaginatedJobs:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobSummary'
        nextPageToken:
          type: string
          nullable: true

    JobEventRecord:
      type: object
      description: A single recorded event in a job's history.
      required: [id, timestamp, stage, event_type]
      properties:
        id:
          type: integer
          description: Monotonically increasing internal event ID (used as cursor).
        timestamp:
          type: string
          format: date-time
        stage:
          type: string
        event_type:
          type: string
        data:
          type: object
          nullable: true
          additionalProperties: true

    PaginatedJobEvents:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobEventRecord'
        nextPageToken:
          type: string
          nullable: true
          description: Page token to pass on the next request to fetch subsequent events.

    ReplayStage:
      type: object
      description: A completed stage that the job can be rewound to.
      required: [name]
      properties:
        name:
          type: string

    ReviewDetail:
      type: object
      description: |
        LLM review data present when a job is in `waiting` state at an
        `llm_text` stage. Contains the input, output, and any clarification
        questions the LLM raised.
      required:
        - stage_name
        - input_text
        - output_text
        - is_single_output
        - confidence
        - qa_rounds
        - clarification_requests
        - document_context_update
        - linked_context_update
      properties:
        stage_name:
          type: string
        input_field:
          type: string
          nullable: true
        output_field:
          type: string
          nullable: true
        input_text:
          type: string
        output_text:
          type: string
        is_single_output:
          type: boolean
        confidence:
          type: string
        qa_rounds:
          type: integer
        clarification_requests:
          type: array
          items:
            $ref: '#/components/schemas/ClarificationRequest'
        document_context_update:
          type: string
        linked_context_update:
          type: string
        context_ref:
          type: string
          nullable: true

    ClarificationRequest:
      type: object
      required: [segment, question]
      properties:
        segment:
          type: string
        question:
          type: string

    # — Job event bodies (discriminated union) ——————————————————————————————————

    ApproveEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [approve]
        edited_text:
          type: string
          default: ''

    RejectEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [reject]

    ClarifyEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [clarify]
        answers:
          type: object
          additionalProperties:
            type: string
          default: {}
        free_prompt:
          type: string
          default: ''
        edited_text:
          type: string
          default: ''

    RetryEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [retry]

    StopEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [stop]

    ReplayEvent:
      type: object
      required: [type, stage]
      properties:
        type:
          type: string
          enum: [replay]
        stage:
          type: string
          description: Name of the pipeline stage to rewind to.

    ProvideContextEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [provide_context]
        document_context:
          type: string
          default: ''
        context_ref:
          type: string
          nullable: true

    ClearErrorsEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [clear_errors]

    JobEventBody:
      description: Discriminated union of all job state-transition event types.
      oneOf:
        - $ref: '#/components/schemas/ApproveEvent'
        - $ref: '#/components/schemas/RejectEvent'
        - $ref: '#/components/schemas/ClarifyEvent'
        - $ref: '#/components/schemas/RetryEvent'
        - $ref: '#/components/schemas/StopEvent'
        - $ref: '#/components/schemas/ReplayEvent'
        - $ref: '#/components/schemas/ProvideContextEvent'
        - $ref: '#/components/schemas/ClearErrorsEvent'
      discriminator:
        propertyName: type
        mapping:
          approve: '#/components/schemas/ApproveEvent'
          reject: '#/components/schemas/RejectEvent'
          clarify: '#/components/schemas/ClarifyEvent'
          retry: '#/components/schemas/RetryEvent'
          stop: '#/components/schemas/StopEvent'
          replay: '#/components/schemas/ReplayEvent'
          provide_context: '#/components/schemas/ProvideContextEvent'
          clear_errors: '#/components/schemas/ClearErrorsEvent'

    # — Contexts ———————————————————————————————————————————————————————————————

    ContextEntry:
      type: object
      description: A named reusable context snippet with an immutable UUID.
      required: [id, name, text]
      properties:
        id:
          type: string
          format: uuid
          description: Immutable identifier assigned at creation.
        name:
          type: string
          description: Human-readable name for this context entry.
        text:
          type: string
          description: The context text injected into LLM prompts.

    PaginatedContexts:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContextEntry'
        nextPageToken:
          type: string
          nullable: true

    CreateContextBody:
      type: object
      required: [name, text]
      properties:
        name:
          type: string
        text:
          type: string

    UpdateContextBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
        text:
          type: string
          nullable: true

    # — Documents request bodies ————————————————————————————————————————————————

    PatchDocumentBody:
      type: object
      description: Fields to update on a document. Only present fields are applied.
      properties:
        title:
          type: string
          nullable: true
        document_context:
          type: string
          nullable: true
        context_ref:
          type: string
          nullable: true
          description: UUID of a context entry to link, or null to unlink.

    # — Chat ———————————————————————————————————————————————————————————————————

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    ChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        context:
          type: string
          default: ''
          description: Optional free-text context injected into the system prompt.
        top_k:
          type: integer
          default: 5
          minimum: 1
          maximum: 20
          description: Number of vector search results to retrieve per turn.

    SourceDoc:
      type: object
      description: A document retrieved from the vector store as a RAG source.
      required: [doc_id, title, score]
      properties:
        doc_id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
          default: ''
        date_month:
          type: string
          default: ''
          description: YYYY-MM month label for the document.
        score:
          type: number
          format: float
