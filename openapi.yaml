openapi: 3.0.3

info:
  title: document-pipeline
  version: 1.0.0
  description: |
    Ingests documents through a configurable OCR → clarify → classify → embed pipeline,
    and stores the results in a vector database for RAG queries.

    Documents move through pipeline stages asynchronously via jobs. Each job represents
    execution of a single stage. The frontend polls for state changes and streams live
    LLM output via Server-Sent Events.

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Pipelines
    description: Pipeline configuration — stage names, types, and models.
  - name: Documents
    description: Document data — title, context, and artifacts.
  - name: Jobs
    description: Pipeline execution state for a document stage.
  - name: Contexts
    description: Reusable named context snippets that can be attached to documents.
  - name: Chat
    description: RAG chat over the embedded knowledge base.

paths:

  # ── Pipelines ────────────────────────────────────────────────────────────────

  /api/v1/pipelines:
    get:
      tags: [Pipelines]
      summary: List pipelines
      description: Returns a paginated list of pipeline configurations loaded from `pipeline.yaml`.
      operationId: listPipelines
      parameters:
        - $ref: '#/components/parameters/page_token'
        - $ref: '#/components/parameters/page_size'
      responses:
        '200':
          description: Paginated list of pipelines with stage summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPipelines'

  /api/v1/pipelines/{pipeline_id}:
    parameters:
      - $ref: '#/components/parameters/pipeline_id'
    get:
      tags: [Pipelines]
      summary: Get pipeline detail
      description: Returns the full configuration for a single pipeline including all stage details.
      operationId: getPipeline
      responses:
        '200':
          description: Full pipeline configuration with stage details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Documents ────────────────────────────────────────────────────────────────

  /api/v1/documents:
    get:
      tags: [Documents]
      summary: List documents
      description: Returns a paginated list of document summaries (no artifacts or context).
      operationId: listDocuments
      parameters:
        - $ref: '#/components/parameters/page_token'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/sort_order'
        - $ref: '#/components/parameters/stages_filter'
        - $ref: '#/components/parameters/statuses_filter'
      responses:
        '200':
          description: Paginated list of document summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocuments'
    post:
      tags: [Documents]
      summary: Upload a document
      description: Upload a .txt, .md, or image file to create a new document. Text files skip the OCR stage.
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  nullable: true
                additional_context:
                  type: string
                  nullable: true
                linked_contexts:
                  type: array
                  items:
                    type: string
                    format: uuid
                  nullable: true
      responses:
        '201':
          description: Document created. Returns initial job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '400':
          description: Unsupported file type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate file — document already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{doc_id}:
    parameters:
      - $ref: '#/components/parameters/doc_id'
    get:
      tags: [Documents]
      summary: Get document detail
      description: Returns full document data — title, context, and artifacts. Does not include job/pipeline state.
      operationId: getDocument
      responses:
        '200':
          description: Document detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Documents]
      summary: Update document
      description: Updates one or more mutable document fields. Only fields present in the request body are changed.
      operationId: patchDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDocumentBody'
      responses:
        '200':
          description: Updated document detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Documents]
      summary: Delete document
      description: Permanently deletes the document, all artifacts, and all jobs.
      operationId: deleteDocument
      responses:
        '200':
          description: Document deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/documents/{doc_id}/artifacts/{artifact_id}:
    parameters:
      - $ref: '#/components/parameters/doc_id'
      - $ref: '#/components/parameters/artifact_id'
    get:
      tags: [Documents]
      summary: Get artifact content
      description: Returns the raw bytes of an artifact with the correct Content-Type header. Use this to display source images, OCR outputs, or any other file produced during pipeline execution.
      operationId: getArtifact
      responses:
        '200':
          description: Artifact bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Jobs ─────────────────────────────────────────────────────────────────────

  /api/v1/jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      description: |
        Returns a paginated list of jobs with denormalized document title.
        `job_id` and `document_id` each accept a comma-separated list of UUIDs.
      operationId: listJobs
      parameters:
        - name: job_id
          in: query
          required: false
          description: Comma-separated list of job UUIDs for a 1:1 fetch by ID.
          schema:
            type: string
        - name: document_id
          in: query
          required: false
          description: Comma-separated list of document UUIDs to filter jobs by.
          schema:
            type: string
        - $ref: '#/components/parameters/page_token'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/stages_filter'
        - $ref: '#/components/parameters/statuses_filter'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: Paginated list of job summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobs'

  /api/v1/jobs/{job_id}:
    parameters:
      - $ref: '#/components/parameters/job_id'
    get:
      tags: [Jobs]
      summary: Get job detail
      description: Returns full job data — stage, status, options, and run history.
      operationId: getJob
      responses:
        '200':
          description: Job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Jobs]
      summary: Update job options
      description: Updates mutable job options (e.g. `embed_image`). Returns the updated job detail.
      operationId: patchJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchJobBody'
      responses:
        '200':
          description: Updated job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/jobs/{job_id}/status:
    parameters:
      - $ref: '#/components/parameters/job_id'
    put:
      tags: [Jobs]
      summary: Transition job status
      description: |
        Transitions the job to a new status. Only valid transitions are accepted; others return 422.

        | From | To | Meaning |
        |------|----|---------|
        | `running` | `error` | Stop |
        | `waiting` | `pending` | Reject |
        | `waiting` | `done` | Approve |
        | `error` | `pending` | Retry / clear errors |
        | `done` | `pending` | Replay (cascades downstream jobs to pending) |

        Setting status to `done` triggers `advance_pipeline` which upserts the next stage job.
        Setting status to `pending` on a completed job cascades all downstream jobs to `pending`.
      operationId: putJobStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutJobStatusBody'
      responses:
        '200':
          description: Updated job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid status transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/jobs/{job_id}/runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/job_id'
      - $ref: '#/components/parameters/run_id'
    patch:
      tags: [Jobs]
      summary: Update a run
      description: |
        Updates a specific run. Typically used to record user answers to clarification
        questions (`questions[].answer`) before setting the job status back to `pending`
        to re-run the stage with the answers injected.
      operationId: patchRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchRunBody'
      responses:
        '200':
          description: Updated run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/jobs/{job_id}/stream:
    parameters:
      - $ref: '#/components/parameters/job_id'
    get:
      tags: [Jobs]
      summary: Stream LLM tokens (SSE)
      description: |
        Server-Sent Events stream of LLM output tokens while the job is
        in the `running` state. Emits `token` events with `{"text": "..."}` payloads
        and a final `done` event when generation completes or status changes.
      operationId: streamJobTokens
      responses:
        '200':
          description: SSE stream of token events.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Contexts ─────────────────────────────────────────────────────────────────

  /api/v1/contexts:
    get:
      tags: [Contexts]
      summary: List contexts
      description: Returns a paginated list of saved context entries.
      operationId: listContexts
      parameters:
        - $ref: '#/components/parameters/page_token'
        - $ref: '#/components/parameters/page_size'
      responses:
        '200':
          description: Paginated list of context entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContexts'
    post:
      tags: [Contexts]
      summary: Create context
      description: Creates a new context entry with an immutable UUID.
      operationId: createContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContextBody'
      responses:
        '201':
          description: Created context entry with assigned ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextEntry'

  /api/v1/contexts/{context_id}:
    parameters:
      - $ref: '#/components/parameters/context_id'
    patch:
      tags: [Contexts]
      summary: Update context
      description: Updates the name and/or text of a context entry. Only present fields are changed.
      operationId: updateContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContextBody'
      responses:
        '200':
          description: Updated context entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextEntry'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Contexts]
      summary: Delete context
      description: Permanently deletes a context entry by its immutable ID.
      operationId: deleteContext
      responses:
        '200':
          description: Context deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Chat ─────────────────────────────────────────────────────────────────────

  /api/v1/chats:
    get:
      tags: [Chat]
      summary: List chats
      description: Returns a paginated list of chat summaries ordered by most recently updated.
      operationId: listChats
      parameters:
        - $ref: '#/components/parameters/page_size'
        - name: before_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of chats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChats'
    post:
      tags: [Chat]
      summary: Create a new chat
      description: Creates a new chat with optional system prompt and RAG retrieval settings.
      operationId: createChat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatBody'
      responses:
        '200':
          description: Newly created chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSummary'

  /api/v1/chats/{chat_id}:
    parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Chat]
      summary: Get chat with messages
      operationId: getChat
      responses:
        '200':
          description: Chat detail including full message history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Chat]
      summary: Update chat
      description: Updates mutable chat fields. Only present fields are applied.
      operationId: patchChat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchChatBody'
      responses:
        '200':
          description: Updated chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSummary'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Chat]
      summary: Delete a chat and all its messages
      operationId: deleteChat
      responses:
        '204':
          description: Chat deleted.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/chats/{chat_id}/messages:
    post:
      tags: [Chat]
      summary: Send a message and stream the RAG-augmented reply
      operationId: sendChatMessage
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageBody'
      responses:
        '200':
          description: SSE stream of token events followed by a done event.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

components:

  # ── Reusable parameters ───────────────────────────────────────────────────────

  parameters:
    doc_id:
      name: doc_id
      in: path
      required: true
      description: UUID of the document.
      schema:
        type: string
        format: uuid

    job_id:
      name: job_id
      in: path
      required: true
      description: UUID of the job.
      schema:
        type: string
        format: uuid

    context_id:
      name: context_id
      in: path
      required: true
      description: Immutable UUID of the context entry.
      schema:
        type: string
        format: uuid

    artifact_id:
      name: artifact_id
      in: path
      required: true
      description: UUID of the artifact.
      schema:
        type: string
        format: uuid

    run_id:
      name: run_id
      in: path
      required: true
      description: UUID of the run.
      schema:
        type: string
        format: uuid

    pipeline_id:
      name: pipeline_id
      in: path
      required: true
      description: Pipeline identifier (filename stem, e.g. `pipeline`).
      schema:
        type: string

    page_token:
      name: page_token
      in: query
      required: false
      description: Opaque cursor token returned by the previous page response. Omit for the first page.
      schema:
        type: string

    page_size:
      name: page_size
      in: query
      required: false
      description: Maximum number of results to return (default 50, max 1000).
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000

    stages_filter:
      name: stages
      in: query
      required: false
      description: Comma-separated list of pipeline stage names to filter by.
      schema:
        type: string
        example: ocr,clarify

    statuses_filter:
      name: statuses
      in: query
      required: false
      description: Comma-separated list of job statuses to filter by.
      schema:
        type: string
        example: pending,waiting

    sort_order:
      name: sort
      in: query
      required: false
      description: Sort order.
      schema:
        type: string
        default: pipeline
        enum: [pipeline, title_asc, title_desc, created_asc, created_desc]

  # ── Reusable responses ────────────────────────────────────────────────────────

  responses:
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ── Schemas ───────────────────────────────────────────────────────────────────

  schemas:

    # — Shared primitives ——————————————————————————————————————————————————————

    JobStatus:
      type: string
      description: Execution status of a job.
      enum: [pending, running, waiting, error, done]

    ErrorResponse:
      type: object
      description: Generic error body.
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    OkResponse:
      type: object
      description: Simple success acknowledgement.
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Always true on success.

    # — Pipelines ——————————————————————————————————————————————————————————————

    StageSummary:
      type: object
      description: Lightweight stage representation used in pipeline list views.
      required: [name, type]
      properties:
        name:
          type: string
          description: Stage identifier (e.g. `ocr`, `clarify`).
        type:
          type: string
          description: Stage handler type (e.g. `llm_text`, `embed`).
        model:
          type: string
          nullable: true
          description: Model used by this stage.

    StageDetail:
      allOf:
        - $ref: '#/components/schemas/StageSummary'
        - type: object
          description: Full stage configuration including I/O and conditional logic.
          properties:
            inputs:
              type: array
              items:
                type: string
              description: Field names consumed by this stage.
            outputs:
              type: array
              items:
                type: object
                required: [field, type]
                properties:
                  field:
                    type: string
                    description: Output field name.
                  type:
                    type: string
                    description: Output type (e.g. `text`, `json_array`).
              description: Fields produced by this stage.
            skip_if:
              type: object
              nullable: true
              description: Conditions under which this stage is skipped entirely.
              additionalProperties: true
            start_if:
              type: object
              nullable: true
              description: Conditions that must be met before this stage can start.
              additionalProperties: true
            continue_if:
              type: array
              nullable: true
              description: Rules that determine if the stage auto-advances without human review.
              items:
                type: object
                additionalProperties: true

    Pipeline:
      type: object
      description: Pipeline configuration with stage summaries.
      required: [id, name, stages]
      properties:
        id:
          type: string
          description: Pipeline identifier (filename stem).
        name:
          type: string
          description: Human-readable pipeline name.
        stages:
          type: array
          description: Ordered list of stage summaries.
          items:
            $ref: '#/components/schemas/StageSummary'

    PipelineDetail:
      type: object
      description: Full pipeline configuration with stage details.
      required: [id, name, stages]
      properties:
        id:
          type: string
          description: Pipeline identifier (filename stem).
        name:
          type: string
          description: Human-readable pipeline name.
        stages:
          type: array
          description: Ordered list of stage details.
          items:
            $ref: '#/components/schemas/StageDetail'

    PaginatedPipelines:
      type: object
      description: Paginated list of pipelines.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Pipeline'
        next_page_token:
          type: string
          nullable: true
          description: Opaque cursor; pass as `page_token` on next request. Null when no more pages.

    # — Documents ——————————————————————————————————————————————————————————————

    Artifact:
      type: object
      description: |
        A file artifact associated with a document. Source images uploaded by the user
        are stored as artifacts with `created_job_id: null`. Pipeline stages (e.g. OCR)
        may produce additional artifacts such as extracted text files.
      required: [id, filename, content_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique artifact identifier.
        filename:
          type: string
          description: Original filename of the artifact.
        content_type:
          type: string
          description: MIME type (e.g. `image/png`, `text/plain`).
        created_job_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the job that created this artifact. Null for source artifacts created during ingest.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp.

    DocumentSummary:
      type: object
      description: Lightweight document representation used in list views.
      required: [id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique document identifier.
        title:
          type: string
          nullable: true
          description: Human-readable title.
        current_job_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the most recently active job for this document.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp.

    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/DocumentSummary'
        - type: object
          description: Full document data including context and artifacts.
          properties:
            additional_context:
              type: string
              description: Free-text context attached by the user to guide LLM stages.
            linked_contexts:
              type: array
              items:
                type: string
                format: uuid
              description: UUIDs of saved context entries linked to this document.
            artifacts:
              type: array
              items:
                $ref: '#/components/schemas/Artifact'
              description: Files associated with this document (e.g. source image).

    PaginatedDocuments:
      type: object
      description: Paginated list of document summaries.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        next_page_token:
          type: string
          nullable: true
          description: Opaque cursor; pass as `page_token` on next request. Null when no more pages.

    PatchDocumentBody:
      type: object
      description: Fields to update on a document. Only present fields are applied.
      properties:
        title:
          type: string
          nullable: true
          description: Updated document title. Null clears the title.
        additional_context:
          type: string
          nullable: true
          description: Free-text context to attach to the document. Null clears it.
        linked_contexts:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: UUIDs of context entries to link. Null clears all linked contexts.

    # — Jobs ———————————————————————————————————————————————————————————————————

    RunIOField:
      type: object
      description: A single input or output field for an LLM run.
      required: [field, text]
      properties:
        field:
          type: string
          nullable: true
          description: Field name (e.g. `ocr_raw`, `clarified_text`).
        text:
          type: string
          description: Field value.

    RunQuestion:
      type: object
      description: A clarification question raised by the LLM, with optional answer.
      required: [segment, question]
      properties:
        segment:
          type: string
          description: The text segment that prompted the question.
        question:
          type: string
          description: The clarification question to present to the user.
        answer:
          type: string
          nullable: true
          description: The user's answer. Null until answered.

    RunSuggestions:
      type: object
      description: LLM-proposed updates to document and linked context.
      properties:
        additional_context:
          type: string
          description: Suggested update to the document's additional context.
        linked_context:
          type: string
          description: Suggested update to the linked context entry text.
        linked_context_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the linked context entry this suggestion applies to.

    Run:
      type: object
      description: |
        A single LLM round trip within a job execution. Jobs accumulate runs over their
        lifetime — each execution (initial run, retry, or re-run after clarification)
        appends a new run to the list.
      required: [id, inputs, outputs, confidence, questions, suggestions, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique run identifier.
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/RunIOField'
          description: Fields fed into the LLM.
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/RunIOField'
          description: Fields produced by the LLM.
        confidence:
          type: string
          enum: [high, medium, low]
          description: LLM-reported confidence in the output.
        questions:
          type: array
          items:
            $ref: '#/components/schemas/RunQuestion'
          description: Clarification questions raised by the LLM.
        suggestions:
          $ref: '#/components/schemas/RunSuggestions'
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when this run started.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when this run was last updated.

    EmbedOptions:
      type: object
      description: Options specific to the embed stage.
      properties:
        embed_image:
          type: boolean
          default: false
          description: Whether to include a visual image vector in addition to the text vector.

    JobOptions:
      type: object
      description: Per-job configuration options.
      properties:
        require_context:
          type: boolean
          default: false
          description: Whether this stage requires context before it can run.
        embed:
          $ref: '#/components/schemas/EmbedOptions'

    JobSummary:
      type: object
      description: Lightweight job representation used in list views.
      required: [id, document_id, stage, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique job identifier.
        document_id:
          type: string
          format: uuid
          description: UUID of the document this job belongs to.
        title:
          type: string
          nullable: true
          description: Denormalized document title.
        stage:
          type: string
          description: Pipeline stage this job executes (e.g. `ocr`, `clarify`).
        status:
          $ref: '#/components/schemas/JobStatus'
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp.

    JobDetail:
      allOf:
        - $ref: '#/components/schemas/JobSummary'
        - type: object
          description: Full job data including options and run history.
          properties:
            options:
              $ref: '#/components/schemas/JobOptions'
            runs:
              type: array
              items:
                $ref: '#/components/schemas/Run'
              description: Ordered list of LLM round trips for this job. Appended on each execution.

    PaginatedJobs:
      type: object
      description: Paginated list of job summaries.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobSummary'
        next_page_token:
          type: string
          nullable: true
          description: Opaque cursor; pass as `page_token` on next request. Null when no more pages.

    PutJobStatusBody:
      type: object
      description: Desired job status. Only valid transitions are accepted.
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, done, error]
          description: Target status. `running` and `waiting` are system-only and cannot be set by clients.

    PatchRunBody:
      type: object
      description: Fields to update on an existing run. Typically used to record user answers to clarification questions.
      properties:
        questions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/RunQuestion'
          description: Questions with updated `answer` values.
        suggestions:
          $ref: '#/components/schemas/RunSuggestions'

    PatchJobBody:
      type: object
      description: Mutable job fields. Only present fields are applied.
      properties:
        options:
          $ref: '#/components/schemas/JobOptions'

    # — Contexts ———————————————————————————————————————————————————————————————

    ContextEntry:
      type: object
      description: A named reusable context snippet with an immutable UUID.
      required: [id, name, text]
      properties:
        id:
          type: string
          format: uuid
          description: Immutable identifier assigned at creation.
        name:
          type: string
          description: Human-readable name for this context entry.
        text:
          type: string
          description: The context text injected into LLM prompts.

    PaginatedContexts:
      type: object
      description: Paginated list of context entries.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContextEntry'
        next_page_token:
          type: string
          nullable: true
          description: Opaque cursor; pass as `page_token` on next request. Null when no more pages.

    CreateContextBody:
      type: object
      description: Payload for creating a new context entry.
      required: [name, text]
      properties:
        name:
          type: string
          description: Human-readable name for this context entry.
        text:
          type: string
          description: The context text injected into LLM prompts.

    UpdateContextBody:
      type: object
      description: Fields to update on a context entry. Omitted fields are unchanged.
      properties:
        name:
          type: string
          nullable: true
          description: Updated name. Null leaves unchanged.
        text:
          type: string
          nullable: true
          description: Updated context text. Null leaves unchanged.

    # — Chat ———————————————————————————————————————————————————————————————————

    RagRetrieval:
      type: object
      description: RAG retrieval configuration for a chat.
      properties:
        enabled:
          type: boolean
          default: true
          description: Whether RAG retrieval is enabled for this chat.
        max_sources:
          type: integer
          default: 5
          minimum: 1
          maximum: 20
          description: Maximum number of source documents to retrieve per query.
        minimum_score:
          type: number
          format: float
          default: 0.0
          description: Minimum similarity score for retrieved sources.

    SourceDoc:
      type: object
      description: A document retrieved from the vector store as a RAG source.
      required: [document_id, title, score]
      properties:
        document_id:
          type: string
          format: uuid
          description: UUID of the source document.
        title:
          type: string
          description: Document title.
        summary:
          type: string
          default: ''
          description: Brief summary of the document's content.
        date_month:
          type: string
          default: ''
          description: YYYY-MM month label for the document.
        score:
          type: number
          format: float
          description: Vector similarity score.

    ChatMessage:
      type: object
      description: A single message turn in a chat.
      required: [id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique message identifier.
        external_id:
          type: string
          nullable: true
          description: External identifier assigned by the LLM provider (e.g. Ollama message ID).
        role:
          type: string
          enum: [user, assistant]
          description: Message author.
        content:
          type: string
          description: Message text.
        sources:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SourceDoc'
          description: Retrieved source documents (only set on assistant messages).
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.

    ChatSummary:
      type: object
      description: Lightweight chat representation used in list views.
      required: [id, rag_retrieval, created_at, updated_at]
      properties:
        id:
          type: string
          description: Chat UUID.
        title:
          type: string
          nullable: true
          description: Auto-derived from the first user message (first 60 chars). Null until the first message is sent.
        system_prompt:
          type: string
          description: Optional freeform context injected into every system prompt.
        rag_retrieval:
          $ref: '#/components/schemas/RagRetrieval'
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp.

    ChatDetail:
      allOf:
        - $ref: '#/components/schemas/ChatSummary'
        - type: object
          description: Full chat data including message history.
          properties:
            messages:
              type: array
              description: All messages in the chat in chronological order.
              items:
                $ref: '#/components/schemas/ChatMessage'

    PaginatedChats:
      type: object
      description: Paginated list of chats ordered by most recently updated.
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChatSummary'
        next_page_token:
          type: string
          nullable: true
          description: Opaque cursor; pass as `page_token` on next request. Null when no more pages.

    CreateChatBody:
      type: object
      description: Options for creating a new chat.
      properties:
        system_prompt:
          type: string
          default: ''
          description: Optional freeform context injected into every system prompt.
        rag_retrieval:
          $ref: '#/components/schemas/RagRetrieval'

    PatchChatBody:
      type: object
      description: Fields to update on an existing chat. Omitted fields are unchanged.
      properties:
        title:
          type: string
          nullable: true
          description: Override the auto-derived title.
        system_prompt:
          type: string
          nullable: true
          description: Updated system prompt. Null clears it.
        rag_retrieval:
          $ref: '#/components/schemas/RagRetrieval'

    SendMessageBody:
      type: object
      description: A new user message to send to the chat.
      required: [content]
      properties:
        content:
          type: string
          description: The user's message text.
