name: test

on:
  push:
    branches: ["main", "go-rewrite", "go/**"]
  pull_request:
    branches: ["main", "go-rewrite"]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
