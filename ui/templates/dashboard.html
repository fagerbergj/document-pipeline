{% extends "base.html" %}
{% block content %}
<style>
.kebab-wrap{position:relative;display:inline-block;}
.kebab-btn{background:none;border:none;cursor:pointer;padding:.2rem .5rem;border-radius:4px;color:#6c757d;font-size:1.15rem;line-height:1;}
.kebab-btn:hover{background:#e9ecef;}
.kebab-menu{display:none;position:fixed;background:#fff;border:1px solid #dee2e6;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);min-width:150px;z-index:1000;padding:.25rem 0;}
.kebab-menu.open{display:block;}
.kebab-menu a,.kebab-menu button{display:block;width:100%;text-align:left;padding:.45rem .9rem;font-size:.88rem;color:#212529;text-decoration:none;background:none;border:none;cursor:pointer;white-space:nowrap;}
.kebab-menu a:hover,.kebab-menu button:hover{background:#f8f9fa;}
.kebab-menu .danger{color:#721c24;}
.kebab-menu .danger:hover{background:#f8d7da;}
.kebab-sep{border:none;border-top:1px solid #dee2e6;margin:.25rem 0;}
</style>
<h1>Dashboard</h1>

<form method="get" action="/" style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;">
  <select name="stage" style="padding:.3rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.88rem;">
    <option value="">All stages</option>
    {% for s in all_stages %}
    <option value="{{ s }}" {% if filter_stage == s %}selected{% endif %}>{{ s }}</option>
    {% endfor %}
  </select>
  <select name="state" style="padding:.3rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.88rem;">
    <option value="">All states</option>
    {% for st in ['pending','running','waiting','error','done'] %}
    <option value="{{ st }}" {% if filter_state == st %}selected{% endif %}>{{ st }}</option>
    {% endfor %}
  </select>
  <select name="sort" style="padding:.3rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.88rem;">
    <option value="created_desc" {% if filter_sort == 'created_desc' %}selected{% endif %}>Newest first</option>
    <option value="created_asc"  {% if filter_sort == 'created_asc'  %}selected{% endif %}>Oldest first</option>
    <option value="title_asc"    {% if filter_sort == 'title_asc'    %}selected{% endif %}>Title A→Z</option>
    <option value="title_desc"   {% if filter_sort == 'title_desc'   %}selected{% endif %}>Title Z→A</option>
  </select>
  <button type="submit" style="padding:.3rem .75rem;border:1px solid #6c757d;border-radius:4px;background:#e9ecef;font-size:.88rem;cursor:pointer;">Filter</button>
  {% if filter_stage or filter_state or filter_sort != 'created_desc' %}
  <a href="/" style="font-size:.85rem;color:#6c757d;">Clear</a>
  {% endif %}
</form>

<div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:.5rem;margin-bottom:.25rem;">
  <div class="counts"
       id="status-counts"
       hx-get="/api/counts"
       hx-trigger="every 10s"
       hx-target="#status-counts"
       hx-swap="innerHTML">
    {% include "partials/status_counts.html" %}
  </div>
  <div style="font-size:.8rem;color:#adb5bd;padding-bottom:.6rem;">
    Refreshing in <span id="refresh-countdown">10</span>s
  </div>
</div>

<div id="dashboard-content">
  {% include "partials/document_table.html" %}
</div>
<script>
var _cd = 10;
var _cdEl = document.getElementById('refresh-countdown');
setInterval(function() {
  _cd--;
  if (_cd <= 0) _cd = 10;
  if (_cdEl) _cdEl.textContent = _cd;
}, 1000);
document.addEventListener('htmx:afterSettle', function(e) {
  if (e.detail && e.detail.target && e.detail.target.id === 'status-counts') {
    _cd = 10;
  }
});
</script>
{% endblock %}
