{% extends "base.html" %}
{% block content %}
<style>
.kebab-wrap{position:relative;display:inline-block;}
.kebab-btn{background:none;border:none;cursor:pointer;padding:.2rem .5rem;border-radius:4px;color:#6c757d;font-size:1.15rem;line-height:1;}
.kebab-btn:hover{background:#e9ecef;}
.kebab-menu{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid #dee2e6;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);min-width:150px;z-index:100;padding:.25rem 0;}
.kebab-menu.open{display:block;}
.kebab-menu a,.kebab-menu button{display:block;width:100%;text-align:left;padding:.45rem .9rem;font-size:.88rem;color:#212529;text-decoration:none;background:none;border:none;cursor:pointer;white-space:nowrap;}
.kebab-menu a:hover,.kebab-menu button:hover{background:#f8f9fa;}
.kebab-menu .danger{color:#721c24;}
.kebab-menu .danger:hover{background:#f8d7da;}
.kebab-sep{border:none;border-top:1px solid #dee2e6;margin:.25rem 0;}
</style>
<h1>Dashboard</h1>

<div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:.5rem;margin-bottom:.25rem;">
  <div class="counts"
       id="status-counts"
       hx-get="/api/counts"
       hx-trigger="every 10s"
       hx-target="#status-counts"
       hx-swap="innerHTML">
    {% include "partials/status_counts.html" %}
  </div>
  <div style="font-size:.8rem;color:#adb5bd;padding-bottom:.6rem;">
    Refreshing in <span id="refresh-countdown">10</span>s
  </div>
</div>

<div id="dashboard-content">
  {% include "partials/document_table.html" %}
</div>
<script>
var _cd = 10;
var _cdEl = document.getElementById('refresh-countdown');
setInterval(function() {
  _cd--;
  if (_cd <= 0) _cd = 10;
  if (_cdEl) _cdEl.textContent = _cd;
}, 1000);
document.addEventListener('htmx:afterSettle', function(e) {
  if (e.detail && e.detail.target && e.detail.target.id === 'status-counts') {
    _cd = 10;
  }
});
</script>
{% endblock %}
