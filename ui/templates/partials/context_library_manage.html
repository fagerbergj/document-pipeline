{% for entry in entries %}
<div style="background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:1rem;margin-bottom:.75rem;">
  <form hx-post="/api/context-library/manage" hx-target="#ctx-list" hx-swap="innerHTML">
    <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;">
      <input type="text" name="library_name" value="{{ entry.name | e }}"
             style="flex:1;padding:.3rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.9rem;font-weight:600;">
      <button type="submit"
              style="padding:.3rem .8rem;border:1px solid #6c757d;border-radius:4px;background:#e9ecef;font-size:.85rem;cursor:pointer;">Save</button>
    </div>
    <textarea name="library_text" rows="5"
              style="width:100%;padding:.4rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.85rem;font-family:monospace;resize:vertical;">{{ entry.text | e }}</textarea>
  </form>
  <form hx-post="/api/context-library/delete" hx-target="#ctx-list" hx-swap="innerHTML"
        hx-confirm="Delete '{{ entry.name | e }}'?" style="margin-top:.4rem;">
    <input type="hidden" name="name" value="{{ entry.name | e }}">
    <button type="submit"
            style="padding:.2rem .6rem;border:1px solid #dc3545;border-radius:4px;background:#fff;color:#dc3545;font-size:.8rem;cursor:pointer;">Delete</button>
  </form>
</div>
{% else %}
<p style="color:#6c757d;">No saved contexts yet.</p>
{% endfor %}

<div style="background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:1rem;margin-bottom:.75rem;border:2px dashed #dee2e6;">
  <div style="font-size:.85rem;font-weight:600;color:#6c757d;margin-bottom:.5rem;">New entry</div>
  <form hx-post="/api/context-library/manage" hx-target="#ctx-list" hx-swap="innerHTML">
    <input type="text" name="library_name" placeholder="Entry name"
           style="width:100%;padding:.3rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.9rem;margin-bottom:.4rem;">
    <textarea name="library_text" rows="4" placeholder="Context text…"
              style="width:100%;padding:.4rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.85rem;font-family:monospace;resize:vertical;margin-bottom:.4rem;"></textarea>
    <button type="submit"
            style="padding:.3rem .8rem;border:1px solid #6c757d;border-radius:4px;background:#e9ecef;font-size:.85rem;cursor:pointer;">Add</button>
  </form>
</div>
