<form hx-post="/api/documents/{{ doc.id }}/title"
      hx-target="#dashboard-content" hx-swap="innerHTML"
      style="display:flex;gap:.4rem;align-items:center;margin-bottom:.6rem;">
  <input type="text" name="title" value="{{ doc.title or '' }}"
         style="flex:1;padding:.25rem .5rem;border:1px solid #ced4da;border-radius:4px;font-size:.88rem;"
         placeholder="Document title">
  <button type="submit"
          style="padding:.25rem .6rem;border:1px solid #6c757d;border-radius:4px;background:#e9ecef;font-size:.82rem;cursor:pointer;">
    Save title
  </button>
</form>
<div class="ocr-detail">{{ ocr_text }}</div>
{% if completed_stages %}
<div style="margin-top:.6rem; display:flex; gap:.4rem; flex-wrap:wrap; align-items:center;">
  <span style="font-size:.8rem; color:#6c757d;">Replay from:</span>
  {% for stage in completed_stages %}
  <button hx-post="/api/documents/{{ doc.id }}/replay/{{ stage.name }}"
          hx-target="#dashboard-content"
          hx-swap="innerHTML"
          hx-confirm="Replay from '{{ stage.name }}'? This will clear all downstream stage data."
          onclick="event.stopPropagation()"
          style="padding:.15rem .5rem;font-size:.78rem;border-radius:4px;border:1px solid #6c757d;background:#e9ecef;color:#495057;cursor:pointer">{{ stage.name }}</button>
  {% endfor %}
</div>
{% endif %}
