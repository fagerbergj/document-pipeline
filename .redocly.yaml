extends:
  - recommended

rules:
  # nullable: true is OpenAPI 3.0 syntax; in 3.1 the proper form is
  # type: [x, 'null']. We use the 3.0 form intentionally because
  # oapi-codegen does not yet handle OAS 3.1 union types correctly.
  struct: warn

  # Security is enforced via Authentik at the reverse-proxy layer.
  # The openIdConnect scheme above documents the auth endpoint.
  # security-defined: off  ← re-enabled; security is declared at root level
